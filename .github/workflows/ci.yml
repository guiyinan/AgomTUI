name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/packages/agomtui-core/src:${{ github.workspace }}/packages/agomtui-compiler/src:${{ github.workspace }}/packages/agomtui-runtime/src

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Runtime build dependencies
        run: npm ci

      - name: Check synchronized Runtime bundle
        run: npm run check:runtime

      - name: Run Runtime JavaScript tests
        run: npm run test:runtime-js

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "jsonschema>=4.21" "django>=5.0,<6" playwright

      - name: Install browser runtime
        run: python -m playwright install --with-deps chromium

      - name: Run core runtime tests
        run: python -m unittest discover packages/agomtui-core/tests

      - name: Run compiler tests
        run: python -m unittest discover packages/agomtui-compiler/tests

      - name: Run runtime asset tests
        run: python -m unittest discover packages/agomtui-runtime/tests

      - name: Run Django host tests
        run: python demo/django_host/manage.py test django_host

      - name: Run Django host browser smoke test
        run: python demo/django_host/manage.py test django_host.browser_tests

      - name: Validate minimal metadata
        run: python -m agomtui_compiler.cli validate-metadata --metadata-file examples/metadata/minimal.tui_operation_graph.json

      - name: Validate rich component metadata
        run: python -m agomtui_compiler.cli validate-metadata --metadata-file examples/metadata/rich_components.tui_operation_graph.json

      - name: Validate generic operations metadata
        run: python -m agomtui_compiler.cli validate-metadata --metadata-file examples/metadata/generic_operations.tui_operation_graph.json

      - name: Check minimal metadata usability
        run: python -m agomtui_compiler.cli check-usability --metadata-file examples/metadata/minimal.tui_operation_graph.json

      - name: Check rich component metadata usability
        run: python -m agomtui_compiler.cli check-usability --metadata-file examples/metadata/rich_components.tui_operation_graph.json

      - name: Check generic operations metadata usability
        run: python -m agomtui_compiler.cli check-usability --metadata-file examples/metadata/generic_operations.tui_operation_graph.json
