[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agomtui-core"
version = "0.1.0"
description = "Schema-first metadata core for AgomTUI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["jsonschema>=4.21"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
